name: Build Wheels

on:
  # Trigger only after Auto Version Bump completes successfully on main.
  # This guarantees: (1) no redundant wheel builds on every commit,
  # (2) wheels always reflect the bumped version, (3) publish only runs
  # after a real release tag exists.
  workflow_run:
    workflows: ["Auto Version Bump"]
    types: [completed]
    branches: [main]

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    # Don't run if the version bump workflow failed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the commit that was tagged by the version bump workflow,
          # not just the default HEAD, so the version in pyproject.toml is correct.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install build cython

      # Pre-generate the .c file from repo root so it is bundled in the sdist.
      # Source installers on unsupported platforms will then only need a C compiler.
      - name: Cythonize
        run: python -m cython --3str simple_equ/geometry/trigonometry.py -o simple_equ/geometry/trigonometry.c

      - name: Build sdist
        run: python -m build --sdist --no-isolation

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      # cibuildwheel reads [tool.cibuildwheel] from pyproject.toml at repo root.
      # The before-build hook re-cythonizes inside each isolated container, then
      # setup.py (inside simple_equ/) compiles geometry/trigonometry.c locally.
      - name: Build wheels
        run: cibuildwheel --output-dir dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}